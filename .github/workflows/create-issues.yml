- Afficher un embed avec 5 SelectMenu (un par grade) listant les rôles Discord existants + option "Créer ce rôle"
- Si "Créer ce rôle" : Guardian crée le rôle Discord et le sélectionne
- Vérifier qu'un seul membre a le grade Owner
- Persister le mapping dans la table \`grades\`

## 📁 Fichiers concernés
- \`modules/initialisation/setup.js\` *(créer)*

## ✅ Critères d'acceptation
- Les 5 grades sont mappés avant de passer à l'étape 2
- Si un rôle Owner est assigné à plusieurs membres → erreur explicite
- La progression vers l'étape 2 nécessite que tous les grades soient configurés
`
              },
              {
