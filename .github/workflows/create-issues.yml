            // Create labels (ignore errors if already exist)
            console.log("Creating labels...");
            for (const label of labelDefs) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                console.log(`✅ Label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`⏭️ Label already exists: ${label.name}`);
                } else {
                  console.warn(`⚠️ Label error (${label.name}): ${e.message}`);
                }
              }
            }

            // Create issues
            console.log("\nCreating issues...");
            let created = 0;
            for (const issue of issues) {
              try {
                const result = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels,
                });
                console.log(`✅ Issue #${result.data.number}: ${issue.title}`);
                created++;
                // Small delay to avoid rate limiting
                await new Promise(r => setTimeout(r, 300));
              } catch (e) {
                console.error(`❌ Failed to create issue "${issue.title}": ${e.message}`);
              }
            }

            console.log(`\n🎉 Done! Created ${created}/${issues.length} issues.`);
