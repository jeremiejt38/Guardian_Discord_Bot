name: 🗂️ Créer les Issues Scrum Guardian

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "oui" pour créer les 37 issues (évite les doublons si relancé)'
        required: true
        default: 'non'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'oui'
    permissions:
      issues: write

    steps:
      - name: Créer toutes les Issues Scrum
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              // ─── SPRINT 0 — INFRASTRUCTURE ───────────────────────────────────────
              {
                title: "[INFRA] #1 — Init projet & configuration (.env, package.json, config.js)",
                labels: ["sprint-0", "infrastructure"],
                body: `## 🎯 Objectif
Initialiser la structure Node.js du projet Guardian et centraliser la configuration depuis les variables d'environnement.

## 📋 Tâches
- Vérifier / compléter \`package.json\` (dépendances : \`discord.js\`, \`better-sqlite3\`, \`dotenv\`)
- Compléter \`.env.example\` avec toutes les clés nécessaires (\`DISCORD_TOKEN\`, \`CLIENT_ID\`, \`NODE_ENV\`)
- Implémenter \`config.js\` : lecture \`.env\`, export des constantes globales (CHANNEL_NAMES, CATEGORY_NAMES, etc.)
- Configurer \`.gitignore\` (\`node_modules/\`, \`.env\`, \`data/guardian.db\`)

## 📁 Fichiers concernés
- \`package.json\`
- \`.env.example\`
- \`config.js\`
- \`.gitignore\`

## ✅ Critères d'acceptation
- \`node index.js\` démarre sans erreur avec un token valide
- Les variables d'env sont accessibles via \`config.js\`
- Les 3 instances (prod / dev / test) sont supportées via \`NODE_ENV\`
`
              },
              {
                title: "[INFRA] #2 — Connexion BDD SQLite & création des tables (database/db.js)",
                labels: ["sprint-0", "infrastructure", "database"],
                body: `## 🎯 Objectif
Initialiser la base de données SQLite via \`better-sqlite3\` et créer toutes les tables définies dans la spec.

## 📋 Tâches
- Créer \`database/db.js\` : ouverture du fichier \`data/guardian.db\`, export de l'instance \`db\`
- Implémenter la création idempotente de toutes les tables (\`IF NOT EXISTS\`) :
  - \`guilds\`, \`guild_config\`, \`grades\`
  - \`games\`, \`member_games\`, \`members\`
  - \`sanctions\`, \`changelogs_seen\`, \`servers_jeu\`
  - \`parrainage\`, \`vocal_temp\`
- Créer le dossier \`database/migrations/\` (vide + \`.gitkeep\`)

## 📁 Fichiers concernés
- \`database/db.js\` *(créer)*
- \`database/migrations/.gitkeep\` *(créer)*
- \`data/.gitkeep\` *(créer — répertoire dans .gitignore)*

## ✅ Critères d'acceptation
- Toutes les tables sont créées au premier lancement
- Aucune erreur si le fichier db existe déjà (idempotence)
- Schéma conforme à la spec (types, PKs, valeurs par défaut)
`
              },
              {
                title: "[INFRA] #3 — Système de logs centralisé (modules/logs/logger.js)",
                labels: ["sprint-0", "infrastructure"],
                body: `## 🎯 Objectif
Créer un module de logs centralisé utilisé par tous les autres modules pour tracer les erreurs et actions.

## 📋 Tâches
- Créer \`modules/logs/logger.js\`
- Logs console horodatés avec niveau : \`INFO\`, \`WARN\`, \`ERROR\`
- Fonction \`logToDiscord(guild, channel, message)\` : poste dans un channel Discord (utilisée pour #logs-mod, #logs-config)
- Export : \`{ log, warn, error, logToDiscord }\`

## 📁 Fichiers concernés
- \`modules/logs/logger.js\` *(créer)*

## ✅ Critères d'acceptation
- Tous les autres modules peuvent importer et utiliser logger sans setup supplémentaire
- Les erreurs ne font jamais crasher le bot (try/catch interne)
- Le niveau ERROR inclut la stack trace
`
              },
              {
                title: "[INFRA] #4 — Point d'entrée du bot (index.js, deploy-commands.js)",
                labels: ["sprint-0", "infrastructure"],
                body: `## 🎯 Objectif
Mettre en place le client Discord.js, charger les events et les commandes slash dynamiquement.

## 📋 Tâches
- Implémenter \`index.js\` : création du \`Client\` Discord.js v14, chargement dynamique des fichiers dans \`events/\` et \`commands/\`
- Implémenter \`deploy-commands.js\` : déploiement des commandes slash via REST API Discord
- Gérer les intents nécessaires : \`Guilds\`, \`GuildMembers\`, \`GuildMessages\`, \`GuildVoiceStates\`, \`MessageContent\`, \`GuildPresences\`

## 📁 Fichiers concernés
- \`index.js\`
- \`deploy-commands.js\`

## ✅ Critères d'acceptation
- Le bot se connecte et logue "✅ Guardian connecté" dans la console
- Les events et commandes sont chargés dynamiquement (pas d'import manuel)
- \`node deploy-commands.js\` déploie les slash commands sans erreur
`
              },
              {
                title: "[INFRA] #5 — Event handler ready.js — vérifications au démarrage",
                labels: ["sprint-0", "infrastructure"],
                body: `## 🎯 Objectif
Implémenter l'event \`ready\` : vérifier les guilds installées, lancer les timers périodiques, nettoyer les vocaux temporaires orphelins.

## 📋 Tâches
- Créer \`events/ready.js\`
- Pour chaque guild : appeler \`checkInstall()\` *(issue #7)*
- Lancer les timers : surveillance serveurs (5 min), changelogs Steam (60 min par défaut), expulsion Invités (24h)
- Supprimer les vocaux temporaires vides restés en base (nettoyage au redémarrage)
- Loguer le statut de démarrage

## 📁 Fichiers concernés
- \`events/ready.js\` *(créer)*

## ✅ Critères d'acceptation
- L'event se déclenche une seule fois au démarrage
- Les timers sont lancés correctement
- Les vocaux orphelins sont supprimés
`
              },
              {
                title: "[INFRA] #6 — Router d'interactions Discord (events/interactionCreate.js)",
                labels: ["sprint-0", "infrastructure"],
                body: `## 🎯 Objectif
Créer le routeur central qui dispatche toutes les interactions Discord (boutons, menus, modals, slash commands) vers les bons handlers.

## 📋 Tâches
- Créer \`events/interactionCreate.js\`
- Router selon \`interaction.type\` :
  - \`ChatInputCommand\` → fichier dans \`commands/\`
  - \`Button\` → handler par \`customId\`
  - \`StringSelectMenu\` → handler par \`customId\`
  - \`ModalSubmit\` → handler par \`customId\`
- Vérifier le grade Guardian de l'utilisateur avant d'exécuter toute action
- Gestion globale des erreurs : reply éphémère "Une erreur est survenue"

## 📁 Fichiers concernés
- \`events/interactionCreate.js\` *(créer)*

## ✅ Critères d'acceptation
- Chaque type d'interaction est correctement routé
- Un utilisateur sans permissions reçoit un message éphémère d'erreur
- Aucune interaction ne reste sans réponse (évite le "Cette interaction a échoué")
`
              },

              // ─── SPRINT 1 — MODULE INITIALISATION ────────────────────────────────
              {
                title: "[SETUP] #7 — checkInstall.js — Vérification installation (hash SHA256 du guildId)",
                labels: ["sprint-1", "module-initialisation"],
                body: `## 🎯 Objectif
Au démarrage et à chaque \`guildCreate\`, vérifier si le serveur est déjà configuré ou s'il faut lancer le flow de setup.

## 📋 Tâches
- Créer \`modules/initialisation/checkInstall.js\`
- Calculer le hash SHA256 du \`guildId\` (module natif \`crypto\`)
- Requête \`SELECT\` sur la table \`guilds\` : comparer \`setup_hash\`
- Si installé → charger la config depuis \`guild_config\`
- Si non installé → déclencher le flow de setup *(issue #8)*
- Export : \`checkInstall(guild)\`

## 📁 Fichiers concernés
- \`modules/initialisation/checkInstall.js\` *(créer)*

## ✅ Critères d'acceptation
- Un serveur déjà installé charge sa config sans relancer le setup
- Un nouveau serveur déclenche le flow de setup automatiquement
- Hash SHA256 utilisé (jamais le guildId brut en base)
`
              },
