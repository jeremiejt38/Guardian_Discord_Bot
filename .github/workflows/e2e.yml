name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: |
          cd guardian
          npm ci
      - name: Run unit tests
        run: |
          cd guardian
          npm test --silent
      - name: Run E2E (requires secrets)
        if: ${{ secrets.DISCORD_TOKEN && secrets.STAGING_GUILD_ID }}
        run: |
          cd guardian
          node e2e/run-e2e.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          STAGING_GUILD_ID: ${{ secrets.STAGING_GUILD_ID }}
